<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Attendance</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>עדכון נוכחות</h1>
      <p class="subtitle">SAP Synerion Attendance Updater</p>
    </header>

    <!-- Quick Action Section -->
    <section class="quick-action">
      <button id="updateAllBtn" class="btn btn-primary btn-large">
        <span class="icon">🏠</span>
        עדכן הכל לעבודה מרחוק
      </button>
      <p class="help-text">עדכן את כל התאריכים לקוד 27 - עבודה מרחוק</p>
    </section>

    <div class="divider">
      <span>או</span>
    </div>

    <!-- Custom Dates Builder Section -->
    <section class="custom-dates">
      <h2>תאריכים מותאמים אישית</h2>
      <p class="help-text">תאריכים שתרצי/ה לשנות לפעילות אחרת</p>

      <div id="dateRows" class="date-rows">
        <!-- Date rows will be added here dynamically -->
      </div>

      <button id="addDateBtn" class="btn btn-secondary">
        <span class="icon">➕</span>
        הוסף תאריך
      </button>
    </section>

    <!-- Action Buttons -->
    <section class="actions">
      <button id="updateCustomBtn" class="btn btn-primary" disabled>
        <span class="icon">✓</span>
        עדכן נוכחות
      </button>
      <button id="clearAllBtn" class="btn btn-ghost">
        נקה הכל
      </button>
    </section>

    <!-- Activity Codes Reference (Collapsible) -->
    <section class="codes-reference">
      <details>
        <summary>📋 רשימת קודי פעילות</summary>
        <div id="codesListContainer" class="codes-list">
          <!-- Will be populated by JavaScript -->
        </div>
      </details>
    </section>

    <!-- Scheduling Settings -->
    <section class="schedule-settings">
      <details>
        <summary>⏰ תזמון אוטומטי</summary>
        <div class="schedule-content">
          <div class="setting-row">
            <label class="checkbox-label">
              <input type="checkbox" id="enableSchedule">
              <span>הפעל תזמון ב-19 לכל חודש</span>
            </label>
          </div>

          <div class="setting-row">
            <label>שעת התזמון:</label>
            <select id="scheduleTime">
              <option value="8">08:00</option>
              <option value="9" selected>09:00</option>
              <option value="10">10:00</option>
              <option value="11">11:00</option>
              <option value="12">12:00</option>
              <option value="14">14:00</option>
            </select>
          </div>

          <div class="setting-row">
            <button id="saveScheduleBtn" class="btn btn-secondary btn-full">
              שמור הגדרות
            </button>
          </div>

          <div class="setting-row">
            <button id="updateNowBtn" class="btn btn-primary btn-full">
              🚀 Update All Now
            </button>
            <p class="help-text" style="margin-top: 8px; font-size: 11px;">
              Opens Synerion and updates all to Remote Work
            </p>
          </div>

          <div id="nextAlarmInfo" class="help-text" style="margin-top: 12px;">
            <!-- Next alarm time will be shown here -->
          </div>
        </div>
      </details>
    </section>

    <!-- Status Display -->
    <section id="statusSection" class="status-section hidden">
      <div class="progress-bar">
        <div id="progressBarFill" class="progress-fill"></div>
      </div>
      <div id="statusLog" class="status-log">
        <!-- Real-time updates will appear here -->
      </div>
    </section>
  </div>

  <script src="../utils/activity-codes.js"></script>
  <script src="popup.js"></script>
</body>
</html>
